# Konfiguracja Nginx: reverse proxy dla db.aionflow.pl:5056
# POST /items/kosciol_katolicki → Nuxt (transformacja + zapis do Directus)
# Pozostałe żądania → Directus
#
# Wymagania:
# - Directus na porcie 8056
# - Nuxt na porcie 3000
# - Skopiuj do /etc/nginx/sites-available/ i utwórz symlink w sites-enabled/
# - nginx -t && systemctl reload nginx

upstream directus {
    server 127.0.0.1:8056;
}
upstream nuxt {
    server 127.0.0.1:3000;
}

server {
    listen 5056;
    server_name db.aionflow.pl;

    client_max_body_size 10M;

    # POST do kosciol_katolicki → Nuxt (transformacja payloadu + zapis)
    location = /items/kosciol_katolicki {
        if ($request_method = POST) {
            proxy_pass http://nuxt;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Content-Type $content_type;
            proxy_pass_request_body on;
            proxy_pass_request_headers on;
            break;
        }
        proxy_pass http://directus;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Pozostałe żądania → Directus
    location / {
        proxy_pass http://directus;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }
}
