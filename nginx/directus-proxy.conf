# Konfiguracja Nginx: reverse proxy dla db.aionflow.pl:8056
# POST /items/kosciol_katolicki → Nuxt (transformacja + zapis do Directus)
# Pozostałe żądania → Directus
#
# Wymagania:
# - Directus na porcie 8057 (wewnętrzny; 8055 zajęty przez inną BD)
# - Nuxt na porcie 3000
# - Nginx nasłuchuje na 8056 (adres publiczny)

upstream directus {
    server 127.0.0.1:8057;
}
upstream nuxt {
    server 127.0.0.1:3000;
}

server {
    listen 8056;
    server_name db.aionflow.pl;

    client_max_body_size 10M;

    # POST do kosciol_katolicki → Nuxt (transformacja payloadu + zapis)
    # W bloku if nie wolno używać proxy_* – przekierowujemy do named location
    location = /items/kosciol_katolicki {
        if ($request_method = POST) {
            rewrite ^ /_nuxt_kosciol_post last;
        }
        proxy_pass http://directus;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /_nuxt_kosciol_post {
        internal;
        proxy_pass http://nuxt/items/kosciol_katolicki;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Content-Type $content_type;
        proxy_pass_request_body on;
        proxy_pass_request_headers on;
    }

    # Pozostałe żądania → Directus
    location / {
        proxy_pass http://directus;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }
}
